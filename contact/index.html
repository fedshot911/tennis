<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | fedshot911 tennis</title>
  <meta name="description" content="fedshot911 tennis 문의 안내입니다.">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="stylesheet" href="/styles.v1.1.1.css?2606222305">
  <link rel="stylesheet" href="/racket-finder/racket-finder.v1.1.6.css?260618">
</head>
<body>
  <header class="service-header">
    <a class="brand" href="/index.html" aria-label="fedshot911 tennis home">
      <img class="brand-mark" src="/assets/app-icons/v2.0.0/fedshot911-brand-mark-48-v2.0.0.png" alt="" aria-hidden="true">
      <img class="brand-wordmark" src="/assets/app-icons/v2.0.0/fedshot911-wordmark-v2.0.0.png" alt="fedshot911">
    </a>
    <span class="service-label">Tennis · Contact</span>
  </header>
  <main class="finder-shell">
    <section class="finder-hero" aria-labelledby="page-title">
      <div class="finder-copy">
        <p class="finder-kicker">Contact</p>
        <h1 id="page-title">Say hello.</h1>
        <p class="finder-lead">
          라켓 파인더 결과 오류, 장비 데이터 수정, 협업 문의가 있으면 편하게 보내주세요.
        </p>
      </div>
      <div class="finder-intro-card">
        <p class="intro-label">Send a message</p>
        <h2>Contact form</h2>
        <p>
          답변이 필요한 내용은 받을 수 있는 이메일 주소를 함께 남겨주세요.
        </p>
        <form class="contact-form" action="mailto:fedshot911@fedshot911.com" method="post" enctype="text/plain">
          <label for="contact-name">Name</label>
          <input id="contact-name" name="Name" type="text" autocomplete="name" required>

          <label for="contact-email">Email</label>
          <input id="contact-email" name="Email" type="email" autocomplete="email" required>

          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="Message" rows="7" required></textarea>

          <button class="button primary contact-submit" type="submit">Send message</button>
        </form>
        <p class="contact-direct">
          Direct email:
          <a class="contact-email-link" href="mailto:fedshot911@fedshot911.com">fedshot911@fedshot911.com</a>
        </p>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <a class="site-footer-brand" href="/" aria-label="fedshot911 tennis home">
      <img src="/assets/app-icons/v2.0.0/fedshot911-brand-mark-48-v2.0.0.png" alt="" aria-hidden="true">
    </a>
    <nav class="site-footer-links" aria-label="Footer">
      <a href="/privacy/">Privacy</a>
      <span aria-hidden="true">·</span>
      <a href="/contact/">Contact</a>
    </nav>
  </footer>
</body>
</html>
